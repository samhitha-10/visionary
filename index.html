<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EyeGuide - Full Assistant</title>
    <style>
        body { margin: 0; padding: 0; background: #222; font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden; }
        
        /* --- SCREEN MANAGEMENT --- */
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; text-align: center; position: relative; }
        .active-screen { display: flex; }
        
        /* --- BUTTONS & INPUTS --- */
        button { padding: 15px 30px; font-size: 18px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; width: 80%; max-width: 300px; }
        .btn-primary { background: #0f0; color: black; }
        .btn-primary:hover { transform: scale(1.05); background: #00cc00; }
        .btn-vehicle { background: #00aaff; color: white; }
        
        input { padding: 15px; font-size: 18px; margin: 10px; border-radius: 8px; border: none; width: 80%; max-width: 300px; text-align: center; }

        /* --- MAIN APP UI --- */
        #screen-app { justify-content: flex-start; padding: 0; overflow: hidden; background: #000; }
        
        #webcam { display: none; }
        
        /* The Canvas is for the Camera Feed */
        #output { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            object-fit: cover; 
            z-index: 1; /* Layer 1 */
        }

        /* The Map View (Google Maps) */
        #map-view {
            display: none;
            width: 100%; height: 100%;
            border: 0;
            position: absolute;
            top: 0; left: 0;
            z-index: 1; /* Layer 1 (Replaces camera when driving) */
        }
        
        /* HUD - Always on top */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            box-sizing: border-box; display: flex; justify-content: space-between; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 10; /* Layer 10 (Top) */
        }
        .hud-box { background: rgba(0,255,0,0.2); border: 2px solid #0f0; padding: 10px; border-radius: 5px; text-shadow: 1px 1px 2px black; }
        
        /* --- TAXI OPTIONS --- */
        .taxi-option { background: #333; border: 1px solid #555; padding: 20px; margin: 10px; width: 80%; cursor: pointer; border-radius: 10px; display: flex; justify-content: space-between; }
        .taxi-option:hover { background: #444; border-color: #00aaff; }

        /* --- EMERGENCY OVERLAY --- */
        #danger-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
        #danger-text { font-size: 40px; font-weight: bold; color: white; text-shadow: 0 0 10px red; text-align: center; }

    </style>
    <!-- Load TensorFlow -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <!-- 1. WELCOME SCREEN -->
    <div id="screen-welcome" class="screen active-screen">
        <h1>EYE GUIDE</h1>
        <p>Smart Navigation & Safety.</p>
        <button class="btn-primary" onclick="startApp()">START SETUP</button>
    </div>

    <!-- 2. PROFILE SCREEN -->
    <div id="screen-profile" class="screen">
        <h2>Profile Setup</h2>
        <p>Your Name</p>
        <input type="text" id="input-name" placeholder="Name">
        <p>Emergency Contact</p>
        <input type="text" id="input-emergency" placeholder="Number">
        <button class="btn-primary" onclick="saveProfile()">NEXT</button>
    </div>

    <!-- 3. PERMISSIONS SCREEN -->
    <div id="screen-permissions" class="screen">
        <h2>Permissions</h2>
        <p>Camera for Safety, GPS for Navigation.</p>
        <button class="btn-primary" onclick="requestPermissions()">ENABLE ACCESS</button>
    </div>

    <!-- 4. DESTINATION SCREEN -->
    <div id="screen-destination" class="screen">
        <h2>Destination</h2>
        <p>Where are you going?</p>
        <input type="text" id="input-dest" placeholder="e.g. Times Square">
        <button class="btn-primary" onclick="selectMode()">SET DESTINATION</button>
    </div>

    <!-- 5. MODE SELECTION SCREEN -->
    <div id="screen-mode" class="screen">
        <h2>Travel Mode</h2>
        <button class="btn-primary" onclick="selectWalk()">WALK 🚶‍♂️</button>
        <button class="btn-primary btn-vehicle" onclick="selectVehicle()">VEHICLE 🚗</button>
    </div>

    <!-- 6. TAXI BOOKING SCREEN -->
    <div id="screen-taxi" class="screen">
        <h2>Book a Ride</h2>
        <div class="taxi-option" onclick="bookRide('Uber', 'Uber X', '$15.00')">
            <span>Uber X</span><span>$15.00</span>
        </div>
        <div class="taxi-option" onclick="bookRide('Ola', 'Ola Mini', '$12.50')">
            <span>Ola Mini</span><span>$12.50</span>
        </div>
        <div class="taxi-option" onclick="bookRide('Own', 'My Car', 'Free')">
            <span>My Car</span><span>Free</span>
        </div>
    </div>

    <!-- 7. MAIN APP SCREEN -->
    <div id="screen-app" class="screen">
        <!-- Camera Feed (Used for Walking) -->
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
        
        <!-- Google Maps Feed (Used for Vehicle) -->
        <iframe id="map-view" src="" allowfullscreen></iframe>
        
        <!-- Heads Up Display -->
        <div id="hud">
            <div class="hud-box">MODE: <span id="hud-mode">WALKING</span></div>
            <div class="hud-box">STATUS: <span id="hud-status">ACTIVE</span></div>
        </div>

        <!-- Emergency Overlay -->
        <div id="danger-overlay">
            <div id="danger-text">WARNING!<br>OBSTACLE</div>
        </div>
    </div>

    <script>
        // --- STATE ---
        let userProfile = { name: "", emergency: "" };
        let destination = "";
        let travelMode = "WALK"; // Default
        let model = undefined;
        let isModelLoaded = false;
        let isEmergency = false;
        
        // --- ELEMENTS ---
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const mapFrame = document.getElementById('map-view');
        const ctx = canvas.getContext('2d');
        const screens = document.querySelectorAll('.screen');

        // --- NAVIGATION ---
        function showScreen(id) {
            screens.forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.rate = 1.0;
                window.speechSynthesis.speak(u);
            }
        }

        // --- FLOWS ---
        function startApp() {
            speak("Welcome to Eye Guide. Let's set up your profile.");
            setTimeout(() => showScreen('screen-profile'), 2000);
        }

        function saveProfile() {
            const name = document.getElementById('input-name').value;
            const emergency = document.getElementById('input-emergency').value;
            if(!name || !emergency) return speak("Please fill all fields.");
            
            userProfile.name = name;
            userProfile.emergency = emergency;
            speak(`Saved. Next, please enable camera and location.`);
            showScreen('screen-permissions');
        }
