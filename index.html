<!DOCTYPE html>
<html>
<head><title>Test Mic</title></head>
<body style="background:black; color:white; text-align:center; padding-top:50px;">
    <h1>Microphone Test</h1>
    <button onclick="testMic()" style="padding:20px; font-size:20px;">Click to Speak</button>
    <p id="result">...</p>

    <script>
        function testMic() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Browser does not support Voice. Use Chrome.");
                return;
            }
            
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            
            recognition.onstart = () => document.getElementById('result').innerText = "Listening...";
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                alert("Heard: " + text);
                document.getElementById('result').innerText = "Heard: " + text;
            };
            
            recognition.onerror = (event) => {
                alert("Error: " + event.error);
                document.getElementById('result').innerText = "Error: " + event.error;
            };
            
            recognition.start();
        }
    </script>
</body>
</html>
